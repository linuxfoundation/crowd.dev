openapi: 3.1.0
info:
  title: OSSPREY Admin API
  version: 1.0.0
  description: >
    Internal endpoints for the OSSPREY V2 Admin Dashboard.


    **Authentication:** Bearer token (Auth0 JWT) in the `Authorization` header.
    All endpoints require a valid session token from the crowd.dev backend.


    **Base path:** All routes are prefixed with `/ossprey/`.

servers:
  - url: https://cm.lfx.dev
    description: Production
  - url: https://lf-staging.crowd.dev
    description: Staging
  - url: http://localhost:8080
    description: Local

tags:
  - name: Metrics
    description: Aggregate KPI metrics for the dashboard header.
  - name: Packages
    description: Package list, scatter plot data.
  - name: Activity
    description: Stewardship activity feed.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: BAD_REQUEST
            message:
              type: string
              example: Invalid query parameter.

    StewardshipStatus:
      type: string
      enum:
        - unassigned
        - open
        - assessing
        - active
        - needs_attention
        - escalated
        - blocked
        - inactive

    HealthBand:
      type: string
      enum: [healthy, fair, concerning, critical]

    VulnSeverity:
      type: string
      enum: [critical, high, medium, low]

    Steward:
      type: object
      required: [userId, role, assignedAt]
      properties:
        userId:
          type: string
          description: Auth0 sub of the assigned steward.
          example: auth0|abc123
        role:
          type: string
          enum: [lead, co_steward]
        assignedAt:
          type: string
          format: date-time

    LastActivity:
      type: object
      required: [type, at]
      properties:
        type:
          type: string
          description: activity_type enum value.
          example: escalation
        content:
          type:
            - string
            - 'null'
          example: 'Escalated with resolution path: right_of_first_refusal'
        at:
          type: string
          format: date-time

    PackageRow:
      type: object
      required:
        - purl
        - name
        - ecosystem
        - openVulns
        - maintainerCount
        - stewards
      properties:
        purl:
          type: string
          example: pkg:npm/lodash@4.17.21
        name:
          type: string
          example: lodash
        ecosystem:
          type: string
          enum: [npm, maven]
        criticalityScore:
          type:
            - number
            - 'null'
          description: packages.impact (0–1 float). Multiply × 100 for display.
          example: 0.94
        stewardshipId:
          type:
            - string
            - 'null'
          example: '4501'
        stewardshipStatus:
          oneOf:
            - $ref: '#/components/schemas/StewardshipStatus'
            - type: 'null'
        openVulns:
          type: integer
          example: 2
        maxVulnSeverity:
          oneOf:
            - $ref: '#/components/schemas/VulnSeverity'
            - type: 'null'
          description: Worst advisory severity for this package. Null if no advisories.
        maintainerCount:
          type: integer
          example: 1
        scorecardScore:
          type:
            - number
            - 'null'
          description: OpenSSF Scorecard score (0–10). Multiply × 10 for display.
          example: 5.2
        healthBand:
          oneOf:
            - $ref: '#/components/schemas/HealthBand'
            - type: 'null'
        latestReleaseAt:
          type:
            - string
            - 'null'
          format: date-time
        lastActivity:
          oneOf:
            - $ref: '#/components/schemas/LastActivity'
            - type: 'null'
        stewards:
          type: array
          items:
            $ref: '#/components/schemas/Steward'

    ScatterPoint:
      type: object
      required:
        - purl
        - name
        - criticalityScore
        - healthScore
        - healthBand
        - openVulns
        - advisoryCount
      properties:
        purl:
          type: string
          example: pkg:npm/lodash@4.17.21
        name:
          type: string
          example: lodash
        criticalityScore:
          type: integer
          description: 0–100 integer (impact × 100, rounded). Y-axis position.
          example: 94
        healthScore:
          type: integer
          description: 0–100 integer (scorecardScore × 10, rounded). X-axis position.
          example: 52
        healthBand:
          $ref: '#/components/schemas/HealthBand'
        stewardshipStatus:
          oneOf:
            - $ref: '#/components/schemas/StewardshipStatus'
            - type: 'null'
        stewardshipId:
          type:
            - string
            - 'null'
          example: '4501'
        openVulns:
          type: integer
          example: 0
        advisoryCount:
          type: integer
          description: Same as openVulns — explicit alias for tooltip display.
          example: 0

    ActivityEntry:
      type: object
      required:
        - id
        - stewardshipId
        - packagePurl
        - packageName
        - packageEcosystem
        - actorType
        - activityType
        - stewardshipStatus
        - createdAt
      properties:
        id:
          type: string
          example: '9182736'
        stewardshipId:
          type: string
          example: '4501'
        packagePurl:
          type: string
          example: pkg:npm/minimist@1.2.6
        packageName:
          type: string
          example: minimist
        packageEcosystem:
          type: string
          enum: [npm, maven]
        actorUserId:
          type:
            - string
            - 'null'
          description: Auth0 sub of the actor. Null for system events.
          example: auth0|abc123
        actorName:
          type:
            - string
            - 'null'
          description: Display name of the actor. Null — resolution from users table pending.
          example: null
        actorType:
          type: string
          enum: [user, system]
        activityType:
          type: string
          enum:
            - state_changed
            - assessment_completed
            - assessment_flagged
            - remediation_logged
            - status_update
            - escalation
            - escalation_resolved
            - blocker_added
            - blocker_resolved
            - steward_added
            - steward_removed
        content:
          type:
            - string
            - 'null'
          example: 'Escalated with resolution path: right_of_first_refusal'
        metadata:
          type:
            - object
            - 'null'
          additionalProperties: true
        stewardshipStatus:
          $ref: '#/components/schemas/StewardshipStatus'
        createdAt:
          type: string
          format: date-time

# ──────────────────────────────────────────────────────────────────────────────
# Paths
# ──────────────────────────────────────────────────────────────────────────────
paths:
  /ossprey/metrics:
    get:
      operationId: getOsspreyMetrics
      summary: KPI bar + Overview summary panel metrics
      tags: [Metrics]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Aggregate metrics for the dashboard.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    required:
                      - totalPackages
                      - criticalPackages
                      - coveragePercent
                      - activeStewards
                      - unassignedCritical
                      - needsAttention
                      - escalated
                    properties:
                      totalPackages:
                        type: integer
                        example: 24381
                      criticalPackages:
                        type: integer
                        example: 1842
                      coveragePercent:
                        type: number
                        format: float
                        description: Percentage of critical packages with active stewardship (1 decimal).
                        example: 33.2
                      coverageTrend:
                        type:
                          - number
                          - 'null'
                        description: Percentage-point delta vs 30 days ago. Null until snapshot mechanism is in place.
                        example: null
                      activeStewards:
                        type: integer
                        example: 612
                      unassignedCritical:
                        type: integer
                        example: 1230
                      needsAttention:
                        type: integer
                        example: 47
                      escalated:
                        type: integer
                        example: 8
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ossprey/packages:
    get:
      operationId: listOsspreyPackages
      summary: Paginated package list — Queue tab and Triage Board columns
      description: >
        Returns a filtered, sorted, paginated list of critical packages with their
        stewardship state. Used by the Queue tab and by the Triage Board (one request
        per status column, fired in parallel).
      tags: [Packages]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 250
            default: 25
        - name: name
          in: query
          description: Case-insensitive substring search on package name.
          schema:
            type: string
          example: lodash
        - name: ecosystem
          in: query
          schema:
            type: string
            enum: [npm, maven]
        - name: lifecycle
          in: query
          schema:
            type: string
            enum: [active, stable, declining, abandoned]
        - name: status
          in: query
          description: >
            Filter by stewardship status. `unassigned` includes packages with no
            stewardship row.
          schema:
            $ref: '#/components/schemas/StewardshipStatus'
        - name: healthBand
          in: query
          schema:
            $ref: '#/components/schemas/HealthBand'
        - name: vulnSeverity
          in: query
          description: >
            `any` = at least one advisory; `high` = worst severity ≥ HIGH;
            `critical` = worst severity = CRITICAL; `none` = zero advisories.
          schema:
            type: string
            enum: [any, high, critical, none]
        - name: staleOnly
          in: query
          schema:
            type: boolean
            default: false
          description: Return only packages with no release in ≥ 18 months.
        - name: unstewardedOnly
          in: query
          schema:
            type: boolean
            default: false
        - name: busFactor1Only
          in: query
          schema:
            type: boolean
            default: false
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [risk, impact, openVulns, health, name]
            default: risk
        - name: sortDir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Paginated package list.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [rows, total, page, pageSize]
                    properties:
                      rows:
                        type: array
                        items:
                          $ref: '#/components/schemas/PackageRow'
                      total:
                        type: integer
                        example: 1842
                      page:
                        type: integer
                        example: 1
                      pageSize:
                        type: integer
                        example: 25
              example:
                data:
                  rows:
                    - purl: pkg:npm/lodash@4.17.21
                      name: lodash
                      ecosystem: npm
                      criticalityScore: 0.94
                      stewardshipId: '4501'
                      stewardshipStatus: needs_attention
                      openVulns: 2
                      maxVulnSeverity: high
                      maintainerCount: 1
                      scorecardScore: 5.2
                      healthBand: fair
                      latestReleaseAt: '2022-01-14T00:00:00Z'
                      lastActivity:
                        type: escalation
                        content: 'Escalated with resolution path: right_of_first_refusal'
                        at: '2024-06-15T10:23:00Z'
                      stewards:
                        - userId: auth0|abc123
                          role: lead
                          assignedAt: '2024-05-01T09:00:00Z'
                  total: 1842
                  page: 1
                  pageSize: 25
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ossprey/packages/scatter:
    get:
      operationId: getOsspreyScatter
      summary: Scatter plot data — Risk Matrix tab
      description: >
        Returns all critical packages as lightweight data points for the health-vs-impact
        scatter plot. No pagination — returns everything in one response.
      tags: [Packages]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All scatter plot points.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [points, total]
                    properties:
                      points:
                        type: array
                        items:
                          $ref: '#/components/schemas/ScatterPoint'
                      total:
                        type: integer
                        example: 1842
              example:
                data:
                  points:
                    - purl: pkg:npm/lodash@4.17.21
                      name: lodash
                      criticalityScore: 94
                      healthScore: 52
                      healthBand: fair
                      stewardshipStatus: needs_attention
                      stewardshipId: '4501'
                      openVulns: 2
                      advisoryCount: 2
                  total: 1842
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ossprey/activity:
    get:
      operationId: getOsspreyActivity
      summary: Paginated activity feed — Overview tab
      description: >
        Returns recent stewardship events across all packages, sorted by date descending.
        The frontend groups items by day using `createdAt`.
      tags: [Activity]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Paginated activity feed.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [rows, total, page, pageSize]
                    properties:
                      rows:
                        type: array
                        items:
                          $ref: '#/components/schemas/ActivityEntry'
                      total:
                        type: integer
                        example: 142
                      page:
                        type: integer
                        example: 1
                      pageSize:
                        type: integer
                        example: 25
              example:
                data:
                  rows:
                    - id: '9182736'
                      stewardshipId: '4501'
                      packagePurl: pkg:npm/minimist@1.2.6
                      packageName: minimist
                      packageEcosystem: npm
                      actorUserId: auth0|abc123
                      actorName: null
                      actorType: user
                      activityType: escalation
                      content: 'Escalated with resolution path: right_of_first_refusal'
                      metadata:
                        resolutionPath: right_of_first_refusal
                        notes: Reached out to maintainer, awaiting response
                      stewardshipStatus: escalated
                      createdAt: '2024-06-15T10:23:00Z'
                  total: 142
                  page: 1
                  pageSize: 25
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

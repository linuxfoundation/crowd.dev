loglevel: info
write-directory: evaluation_results
write: true
services:
  $REPO_NAME:
    plugin: github-repo

    policy:
      catalogs:
        - osps-baseline-2026-02
      applicability:
        - Maturity Level 1

    vars:
      owner: '$REPO_OWNER'
      repo: '$REPO_NAME'
      token: '$GITHUB_TOKEN'

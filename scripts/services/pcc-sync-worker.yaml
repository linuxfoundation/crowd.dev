version: '3.1'

x-env-args: &env-args
  DOCKER_BUILDKIT: 1
  NODE_ENV: docker
  SERVICE: pcc-sync-worker
  CROWD_TEMPORAL_TASKQUEUE: pccSync
  SHELL: /bin/sh

services:
  pcc-sync-worker:
    build:
      context: ../../
      dockerfile: ./scripts/services/docker/Dockerfile.pcc_sync_worker
    command: 'pnpm run start'
    working_dir: /usr/crowd/app/services/apps/pcc_sync_worker
    env_file:
      - ../../backend/.env.dist.local
      - ../../backend/.env.dist.composed
      - ../../backend/.env.override.local
      - ../../backend/.env.override.composed
    environment:
      <<: *env-args
    restart: always
    networks:
      - crowd-bridge

  pcc-sync-worker-dev:
    build:
      context: ../../
      dockerfile: ./scripts/services/docker/Dockerfile.pcc_sync_worker
    command: 'pnpm run dev'
    working_dir: /usr/crowd/app/services/apps/pcc_sync_worker
    env_file:
      - ../../backend/.env.dist.local
      - ../../backend/.env.dist.composed
      - ../../backend/.env.override.local
      - ../../backend/.env.override.composed
    environment:
      <<: *env-args
    hostname: pcc-sync-worker
    networks:
      - crowd-bridge
    volumes:
      - ../../services/libs/common/src:/usr/crowd/app/services/libs/common/src
      - ../../services/libs/database/src:/usr/crowd/app/services/libs/database/src
      - ../../services/libs/logging/src:/usr/crowd/app/services/libs/logging/src
      - ../../services/libs/slack/src:/usr/crowd/app/services/libs/slack/src
      - ../../services/libs/snowflake/src:/usr/crowd/app/services/libs/snowflake/src
      - ../../services/libs/temporal/src:/usr/crowd/app/services/libs/temporal/src
      - ../../services/libs/types/src:/usr/crowd/app/services/libs/types/src
      - ../../services/archetypes/standard/src:/usr/crowd/app/services/archetypes/standard/src
      - ../../services/archetypes/worker/src:/usr/crowd/app/services/archetypes/worker/src
      - ../../services/apps/pcc_sync_worker/src:/usr/crowd/app/services/apps/pcc_sync_worker/src

networks:
  crowd-bridge:
    external: true

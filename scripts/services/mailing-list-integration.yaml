
x-env-args: &env-args
  DOCKER_BUILDKIT: 1
  NODE_ENV: docker
  SERVICE: mailing-list-integration
  SHELL: /bin/sh

services:
  mailing-list-integration:
    build:
      context: ../../
      dockerfile: ./scripts/services/docker/Dockerfile.mailing_list_integration
    working_dir: /usr/crowd/app
    env_file:
      - ../../backend/.env.dist.local
      - ../../backend/.env.dist.composed
      - ../../backend/.env.override.local
      - ../../backend/.env.override.composed
    environment:
      <<: *env-args
    restart: always
    networks:
      - crowd-bridge
    ports:
      - '8086:8085'
    volumes:
      - lore-mirror-dev:/var/lore

  mailing-list-integration-dev:
    build:
      context: ../../
      dockerfile: ./scripts/services/docker/Dockerfile.mailing_list_integration
    command: ["./src/runner.sh", "local"]
    working_dir: /usr/crowd/app
    env_file:
      - ../../backend/.env.dist.local
      - ../../backend/.env.dist.composed
      - ../../backend/.env.override.local
      - ../../backend/.env.override.composed
    environment:
      <<: *env-args
    hostname: mailing-list-integration
    ports:
      - '8086:8085'
    networks:
      - crowd-bridge
    volumes:
      - ../../services/apps/mailing_list_integration/src:/usr/crowd/app/src
      - lore-mirror-dev:/var/lore

networks:
  crowd-bridge:
    external: true

# Mirrors are large public-inbox git archives that are expensive to reclone;
# without a named volume, `make run`'s `docker compose run --rm` and any
# container recreation wipe /var/lore and force a full reclone before
# incremental processing can resume.
volumes:
  lore-mirror-dev:
